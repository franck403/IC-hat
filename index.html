<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maintenance</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0d0d0d;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .box {
    max-width: 450px;
    width: 100%;
  }

  h1 {
    font-size: 2.4rem;
    margin-bottom: 12px;
    font-weight: 700;
  }

  p {
    font-size: 1.1rem;
    opacity: 0.85;
    margin-bottom: 20px;
  }

  .loader {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #e63946;
    border-radius: 50%;
    margin: 0 auto;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .time {
    margin-top: 20px;
    opacity: 0.7;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="box">
  <h1>Maintenance in Progress</h1>
  <p>Ic-hat will be back before 2026. Full remake</p>
  <div class="loader"></div>
  <div class="time" id="time"></div>
</div>

<script>
  function updateTime() {
    const now = new Date();
    document.getElementById("time").textContent =
      "Last update: " + now.toLocaleString();
  }
  updateTime();
  setInterval(updateTime, 30000);
</script>

</body>
</html>
